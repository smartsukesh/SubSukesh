<script>
// ═══════════════════════════════════════════════════════════════════════════
// FIREBASE CONFIGURATION & AUTH
// ═══════════════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA-t7NepAe9mwKuiao04TmYhGucKZTJufo",
  authDomain: "subsukesh.firebaseapp.com",
  databaseURL: "https://subsukesh-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "subsukesh",
  storageBucket: "subsukesh.firebasestorage.app",
  messagingSenderId: "291568174592",
  appId: "1:291568174592:web:74aff29d12bc6bf8dfbae5"
};

let firebaseApp = null;
let database = null;
let isFirebaseEnabled = false;
let currentUser = null;
let dbListenerRef = null;

function initFirebase() {
  try {
    firebaseApp = firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    isFirebaseEnabled = true;
    console.log("✅ Firebase initialized!");
    setupAuthListener();
    return true;
  } catch (error) {
    console.error("❌ Firebase initialization error:", error);
    isFirebaseEnabled = false;
    return false;
  }
}

function setupAuthListener() {
  firebase.auth().onAuthStateChanged((user) => {
    const menuAuthBtn = document.getElementById('menuAuthBtn');
    if (user) {
      currentUser = user;
      if (menuAuthBtn) {
        menuAuthBtn.innerHTML = '<img src="logout.png" alt="Sign Out" style="width: 16px; height: 16px; object-fit: contain;"> Sign Out';
        menuAuthBtn.title = `Sign Out (${user.displayName ? user.displayName.split(' ')[0] : 'User'})`;
      }
      showToast(`Welcome, ${user.displayName ? user.displayName.split(' ')[0] : 'User'}!`);
      loadFromFirebase();
      setupFirebaseListener();
    } else {
      currentUser = null;
      if (menuAuthBtn) {
        menuAuthBtn.innerHTML = '👤 Sign In';
        menuAuthBtn.title = 'Sign In with Google';
      }
      if (dbListenerRef) dbListenerRef.off();
      subs = JSON.parse(localStorage.getItem('subsukesh_subs') || '[]');
      render();
    }
  });
}

function toggleAuth() {
  if (currentUser) {
    firebase.auth().signOut().then(() => showToast('Signed out successfully'));
  } else {
    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(error => {
      showToast('Sign in failed: ' + error.message, true);
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// FIREBASE SYNC — USER SCOPED
// ═══════════════════════════════════════════════════════════════════════════

function loadFromFirebase() {
  if (!isFirebaseEnabled || !currentUser) return;

  const userRef = database.ref(`users/${currentUser.uid}/subscriptions`);
  userRef.once('value')
    .then((snapshot) => {
      if (snapshot.exists()) {
        subs = snapshot.val() || [];
        console.log("📥 Loaded", subs.length, "subscriptions from Cloud");
        render();
      } else {
        const localData = localStorage.getItem('subsukesh_subs');
        if (localData) {
          subs = JSON.parse(localData);
          saveToFirebase();
          console.log("📤 Migrated local subscriptions to Cloud");
        }
      }
    })
    .catch((error) => console.error("❌ Error loading from Firebase:", error));
}

function saveToFirebase() {
  localStorage.setItem('subsukesh_subs', JSON.stringify(subs));
  if (!isFirebaseEnabled || !currentUser) return;

  const userRef = database.ref(`users/${currentUser.uid}/subscriptions`);
  userRef.set(subs)
    .then(() => console.log("💾 Saved to Firebase Cloud"))
    .catch((error) => console.error("❌ Error saving to Firebase:", error));
}

function setupFirebaseListener() {
  if (!isFirebaseEnabled || !currentUser) return;
  if (dbListenerRef) dbListenerRef.off();

  dbListenerRef = database.ref(`users/${currentUser.uid}/subscriptions`);
  dbListenerRef.on('value', (snapshot) => {
    if (snapshot.exists()) {
      const newSubs = snapshot.val() || [];
      if (JSON.stringify(newSubs) !== JSON.stringify(subs)) {
        subs = newSubs;
        console.log("🔄 Real-time update received!");
        render();
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA EXPORT (CSV)
// ═══════════════════════════════════════════════════════════════════════════
function exportToCSV() {
  if (!subs || subs.length === 0) {
    showToast('No subscriptions to export!', true);
    return;
  }

  let csvContent = "Name,Price (₹),Billing Cycle,Category,Start Date,End Date,Payment Mode,Status\n";
  subs.forEach(s => {
    const name = `"${s.name.replace(/"/g, '""')}"`;
    const price = s.price.toFixed(2);
    const cycle = s.billing === 'days' ? `Every ${s.billingDays} days` : s.billing;
    const category = s.category;
    const start = s.startDate;
    const end = s.endDate || "N/A";
    const payMode = (s.paymentMode || "N/A").toUpperCase();
    const status = s.ended ? "Ended" : "Active";
    csvContent += `${name},${price},${cycle},${category},${start},${end},${payMode},${status}\n`;
  });

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  const dateStr = new Date().toISOString().split('T')[0];
  link.setAttribute("download", `SubSukesh_Export_${dateStr}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('Spreadsheet downloaded! 📊');
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA & STATE
// ═══════════════════════════════════════════════════════════════════════════
let subs = [];
let pieChartInstance = null;

function toggleTheme() {
  const body = document.body;
  const slider = document.querySelector('.theme-toggle-slider');
  if (body.classList.contains('light-mode')) {
    body.classList.remove('light-mode');

    localStorage.setItem('subsukesh_theme', 'dark');

    body.classList.add('light-mode');

function loadTheme() {
  const savedTheme = localStorage.getItem('subsukesh_theme');
  const slider = document.querySelector('.theme-toggle-slider');
  if (savedTheme === 'light') {
    document.body.classList.add('light-mode');
    slider.textContent = '☀️';
  } else {
    slider.textContent = '🌙';

const knownSubs = [
  { name: 'Netflix', emoji: '🎬' },
  { name: 'Spotify', emoji: '🎵' },
  { name: 'YouTube', emoji: '▶️' },
  { name: 'YouTube Premium', emoji: '▶️' },
  { name: 'Prime Video', emoji: '📺' },
  { name: 'Disney+', emoji: '🏰' },
  { name: 'Hotstar', emoji: '⭐' },
  { name: 'Apple Music', emoji: '🍎' },
  { name: 'iCloud', emoji: '☁️' },
  { name: 'Google One', emoji: '📦' },
  { name: 'Dropbox', emoji: '📁' },
  { name: 'ChatGPT', emoji: '🤖' },
  { name: 'GitHub', emoji: '🐙' },
  { name: 'Adobe', emoji: '🎨' },
  { name: 'Figma', emoji: '🎨' },
  { name: 'Notion', emoji: '📝' },
  { name: 'Canva', emoji: '🎨' }
];

function matchKnown(name) {
  return knownSubs.find(k => k.name.toLowerCase() === name.toLowerCase());
}

function save() { saveToFirebase(); }

function render() {
  renderSummary();
  renderChart();
  renderSubs();
  updateNotifBell();
}

function renderSummary() {
  const active = subs.filter(s => !s.ended);
  let monthly = 0, annual = 0;
  active.forEach(s => {
    if (s.billing === 'monthly') {
      monthly += s.price;
      annual += s.price * 12;
    } else if (s.billing === 'annual') {
      monthly += s.price / 12;
      annual += s.price;
    } else if (s.billing === 'weekly') {
      monthly += s.price * 4;
      annual += s.price * 52;
    } else if (s.billing === 'days') {
      const perDay = s.price / (s.billingDays || 30);
      monthly += perDay * 30;
      annual += perDay * 365;
    }
  });

  document.getElementById('monthlyTotal').innerHTML = `₹${monthly.toFixed(0)}<span>/mo</span>`;
  document.getElementById('annualTotal').innerHTML = `₹${annual.toFixed(0)}<span>/yr</span>`;
  document.getElementById('subsCount').textContent = active.length;
  document.getElementById('activeCountBadge').textContent = `${active.length} active`;

  const upcoming = active.filter(s => s.endDate).sort((a,b) => new Date(a.endDate) - new Date(b.endDate));
  document.getElementById('nextRenewal').textContent = upcoming.length > 0 ? fmtDate(upcoming[0].endDate) : '—';
}

function renderChart() {
  const active = subs.filter(s => !s.ended);
  if (active.length === 0) {
    document.getElementById('chartContainer').innerHTML = `<div class="no-data-msg">Add subscriptions to see breakdown</div>`;
    if (pieChartInstance) { pieChartInstance.destroy(); pieChartInstance = null; }
    return;
  }
  const byCategory = {};
  active.forEach(s => {
    byCategory[s.category] = (byCategory[s.category] || 0) + toMonthly(s);
  });

  const labels = Object.keys(byCategory);
  const data = Object.values(byCategory);
  const total = data.reduce((a,b) => a+b, 0);
  const colors = ['#f5c542','#9b7fe8','#4cd9a0','#ff5e72','#f09d51','#5eb3f6'];

  document.getElementById('chartContainer').innerHTML = `
    <div class="chart-canvas-wrap"><canvas id="pieChart"></canvas></div>
    <div class="chart-legend">
      ${labels.map((label, i) => `
        <div class="legend-item">
          <div class="legend-dot" style="background:${colors[i % colors.length]}"></div>
          <div class="legend-name">${label}</div>
          <div class="legend-pct">${((data[i]/total)*100).toFixed(0)}%</div>
        </div>`).join('')}
    </div>`;

  if (pieChartInstance) pieChartInstance.destroy();
  pieChartInstance = new Chart(document.getElementById('pieChart').getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      responsive: false,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => `₹${ctx.parsed.toFixed(0)} (${((ctx.parsed/total)*100).toFixed(0)}%)`
          }
        }
      },
      cutout: '65%'
    }
  });
}

function toMonthly(s) {
  if (s.billing === 'monthly') return s.price;
  if (s.billing === 'annual') return s.price / 12;
  if (s.billing === 'weekly') return s.price * 4;
  if (s.billing === 'days') return (s.price / (s.billingDays || 30)) * 30;
  if (s.billing === 'one-time') return 0;
  return s.price;
}

function getSubStatus(s) {
  if (s.ended) return 'red';
  if (!s.endDate) return 'green';
  const h = hoursLeft(s.endDate);
  if (h === null) return 'green';
  if (h <= 168) return 'yellow';
  return 'green';
}

function sortByStatus(arr) {
  return arr.sort((a, b) => {
    const order = { yellow: 0, green: 1, red: 2 };
    const diff = order[getSubStatus(a)] - order[getSubStatus(b)];
    if (diff !== 0) return diff;
    if (a.endDate && b.endDate) return new Date(a.endDate) - new Date(b.endDate);
    return 0;
  });
}

function renderSubs() {
  const filtered = subs.filter(s => !s.ended);
  const container1 = document.getElementById('subsContainer1');
  const container2 = document.getElementById('subsContainer2');

  if (filtered.length === 0) {
    container1.innerHTML = `<div class="empty-state"><div class="empty-emoji">📦</div><p>No subscriptions yet.<br>Add one to get started!</p></div>`;
    container2.innerHTML = '';
    return;
  }

  const sorted = sortByStatus([...filtered]);
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    container1.innerHTML = sorted.map(renderSubCard).join('');
    container2.innerHTML = '';
  } else {
    const col1 = [], col2 = [];
    sorted.forEach((sub, i) => i % 2 === 0 ? col1.push(sub) : col2.push(sub));
    container1.innerHTML = col1.map(renderSubCard).join('');
    container2.innerHTML = col2.map(renderSubCard).join('');
  }
}

function renderSubCard(s) {
  const known = matchKnown(s.name);
  const emoji = s.customLogo ? '' : ((known && known.emoji) || '📦');
  const logo = s.customLogo || null;
  const logoHTML = logo ? `<img src="${logo}" alt="${s.name}">` : emoji;
  const cycle = s.billing === 'days'
    ? `Every ${s.billingDays} days`
    : (s.billing === 'one-time'
        ? 'One-time'
        : s.billing.charAt(0).toUpperCase() + s.billing.slice(1));
  const endDateHTML = s.endDate ? fmtDate(s.endDate) : '—';
  const payBadge = s.paymentMode ? `<div class="pay-badge">${s.paymentMode.toUpperCase()}</div>` : '';
  const daysText = formatDaysLeft(getDaysLeft(s));
  const status = getSubStatus(s);
  const daysLeftBadge = daysText ? `<div class="days-left-badge ${status}">${daysText}</div>` : '';

  return `
    <div class="sub-card" id="sub-${s.id}" onclick="toggleCard('${s.id}')">
      <div class="sub-row">
        <div class="sub-logo">${logoHTML}</div>
        <div class="sub-info">
          <div class="sub-name">${escHtml(s.name)}</div>
          <div class="sub-cycle">${cycle}</div>
        </div>
        <div class="sub-meta">
          <div class="sub-row-price">₹${s.price.toFixed(0)}</div>
          <div class="sub-row-enddate">${endDateHTML}</div>
          ${payBadge}
          ${daysLeftBadge}
          <div class="status-dot ${status}"></div>
        </div>
      </div>
      <div class="sub-details">
        <div class="detail-item"><div class="detail-label">Category</div><div class="detail-value">${s.category}</div></div>
        <div class="detail-item"><div class="detail-label">Start</div><div class="detail-value">${fmtDate(s.startDate)}</div></div>
        <div class="detail-item"><div class="detail-label">End</div><div class="detail-value">${endDateHTML}</div></div>
        <div class="detail-item"><div class="detail-label">Payment</div><div class="detail-value">${s.paymentMode ? s.paymentMode.toUpperCase() : '—'}</div></div>
      </div>
      <div class="sub-actions">
        <button class="sub-btn edit" onclick="event.stopPropagation(); openEdit('${s.id}')">Edit</button>
        ${!s.ended ? `<button class="sub-btn renew" onclick="event.stopPropagation(); renewSub('${s.id}')">Renew</button>` : ''}
        ${!s.ended ? `<button class="sub-btn end" onclick="event.stopPropagation(); endSub('${s.id}')">End</button>` : ''}
      </div>
    </div>`;
}

function toggleCard(id) {
  const clicked = document.getElementById('sub-' + id);
  const wasExpanded = clicked.classList.contains('expanded');
  document.querySelectorAll('.sub-card.expanded').forEach(card => {
    card.classList.remove('expanded');
  });
  if (!wasExpanded) clicked.classList.add('expanded');
}

function addSub() {
  const name = document.getElementById('subName').value.trim();
  const price = parseFloat(document.getElementById('subPrice').value);
  const billing = document.getElementById('subBilling').value;
  const category = document.getElementById('subCategory').value;
  const startDate = document.getElementById('subStartDate').value;
  const endDate = document.getElementById('subEndDate').value;
  const billingDays = billing === 'days'
    ? parseInt(document.getElementById('subDays').value) || 30
    : null;
  const paymentMode = getPaymentMode('sub');

  if (!name || isNaN(price) || price <= 0) {
    showToast('Please enter a valid name and price', true);
    return;
  }

  subs.push({
    id: Date.now().toString(),
    name,
    price,
    billing,
    billingDays,
    category,
    startDate,
    endDate,
    paymentMode,
    ended: false,
    autoRenewed: false,
    customLogo: null
  });
  save();
  render();

  document.getElementById('subName').value = '';
  document.getElementById('subPrice').value = '';
  document.getElementById('subBilling').value = 'monthly';
  document.getElementById('subCategory').value = 'Entertainment';
  handleBillingChange('sub');
  document.getElementById('subStartDate').value = new Date().toISOString().split('T')[0];
  autoCalcEndDateByCycle('sub', 'monthly');
  selectPaymentMode('sub', 'debit');
  showToast(`${name} added ✓`);
}

function openEdit(id) {
  const s = subs.find(sub => sub.id === id);
  if (!s) return;
  document.getElementById('editId').value = s.id;
  document.getElementById('editName').value = s.name;
  document.getElementById('editPrice').value = s.price;
  document.getElementById('editBilling').value = s.billing;
  document.getElementById('editCategory').value = s.category;
  document.getElementById('editStartDate').value = s.startDate;
  document.getElementById('editEndDate').value = s.endDate || '';
  document.getElementById('editDays').value = s.billingDays || 30;
  handleBillingChange('edit');
  selectPaymentMode('edit', s.paymentMode || 'debit');
  document.getElementById('editIconInput')._pendingLogo = null;
  document.getElementById('editIconInput')._removeLogo = false;
  document.getElementById('editModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  updateEditIconPreview(s.customLogo || null, s.name);
  document.addEventListener('keydown', handleEditEscKey);
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('editIconInput')._pendingLogo = null;
  document.getElementById('editIconInput')._removeLogo = false;
  document.removeEventListener('keydown', handleEditEscKey);
}

function handleEditEscKey(e) { if (e.key === 'Escape') closeEdit(); }
function handleOverlayClick(e) {
  if (e.target === document.getElementById('editModal')) closeEdit();
}

function saveEdit() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('editName').value.trim();
  const price = parseFloat(document.getElementById('editPrice').value);
  const billing = document.getElementById('editBilling').value;
  const category = document.getElementById('editCategory').value;
  const startDate = document.getElementById('editStartDate').value;
  const endDate = document.getElementById('editEndDate').value;
  const billingDays = billing === 'days'
    ? parseInt(document.getElementById('editDays').value) || 30
    : null;
  const paymentMode = getPaymentMode('edit');

  if (!name || isNaN(price) || price <= 0) {
    showToast('Please enter a valid name and price', true);
    return;
  }

  const idx = subs.findIndex(s => s.id === id);
  if (idx === -1) return;

  const pendingLogo = document.getElementById('editIconInput')._pendingLogo;
  const removeLogo = document.getElementById('editIconInput')._removeLogo;
  let customLogo = subs[idx].customLogo || null;
  if (removeLogo) customLogo = null;
  if (pendingLogo) customLogo = pendingLogo;

  subs[idx] = {
    ...subs[idx],
    name,
    price,
    billing,
    billingDays,
    category,
    startDate,
    endDate,
    paymentMode,
    customLogo
  };
  save();
  render();
  closeEdit();
  showToast(`${name} updated ✓`);
}

function renewSub(id) {
  const idx = subs.findIndex(s => s.id === id);
  if (idx === -1) return;
  const s = subs[idx];
  const newStart = s.endDate || new Date().toISOString().split('T')[0];
  const newEnd = computeEndDateFrom(newStart, s);
  subs[idx] = {
    ...s,
    startDate: newStart,
    endDate: newEnd,
    ended: false,
    autoRenewed: false
  };
  save();
  render();
  setTimeout(() => {
    const card = document.getElementById('sub-' + id);
    if (card) card.classList.add('just-renewed');
  }, 50);
  showToast(`${s.name} renewed until ${fmtDate(newEnd)} 🎉`);
}

function endSub(id) {
  const idx = subs.findIndex(s => s.id === id);
  if (idx === -1) return;
  subs[idx] = { ...subs[idx], ended: true };
  save();
  render();
  showToast(`${subs[idx].name} marked as ended.`);
}

function computeEndDateFrom(startStr, s) {
  const d = new Date(startStr);
  if (s.billing === 'monthly') d.setDate(d.getDate() + 30);
  else if (s.billing === 'annual') { d.setFullYear(d.getFullYear() + 1); d.setDate(d.getDate() - 1); }
  else if (s.billing === 'weekly') d.setDate(d.getDate() + 7);
  else if (s.billing === 'days') d.setDate(d.getDate() + (s.billingDays || 30));
  else if (s.billing === 'one-time') return;
  else d.setDate(d.getDate() + 30);
  return d.toISOString().split('T')[0];
}

function autoRenewExpired() {
  const today = new Date(); today.setHours(0,0,0,0);
  let renewed = [];
  let updated = false;

  subs = subs.map(s => {
    if (s.ended || !s.endDate) return s;
    const end = new Date(s.endDate); end.setHours(23,59,59,0);
    if (end < today) {
      if (s.billing === 'one-time') {
        updated = true;
        return { ...s, ended: true };
      }
      renewed.push(s.name);
      updated = true;
      return {
        ...s,
        startDate: s.endDate,
        endDate: computeEndDateFrom(s.endDate, s),
        autoRenewed: true
      };
    }
    return s;
  });

  if (updated) {
    save();
    if (renewed.length > 0) {
      showToast(
        renewed.length === 1
          ? `Auto-renewed: ${renewed[0]} 🔄`
          : `Auto-renewed ${renewed.length} subscriptions 🔄`
      );
    }
  }
}

function handleEditIconUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('editIconInput')._pendingLogo = e.target.result;
    document.getElementById('editIconInput')._removeLogo = false;
    updateEditIconPreview(
      e.target.result,
      document.getElementById('editName').value || '?'
    );
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeEditIcon() {
  document.getElementById('editIconInput')._pendingLogo = null;
  document.getElementById('editIconInput')._removeLogo = true;
  updateEditIconPreview(null, document.getElementById('editName').value || '?');
}

function updateEditIconPreview(logoUri, name) {
  const preview = document.getElementById('editIconPreview');
  const fallback = document.getElementById('editIconFallback');
  const removeBtn = document.getElementById('editIconRemoveBtn');
  const existing = preview.querySelector('img.icon-preview-img');
  if (existing) existing.remove();
  if (logoUri) {
    fallback.style.display = 'none';
    const img = document.createElement('img');
    img.className = 'icon-preview-img';
    img.src = logoUri;
    img.style.cssText =
      'width:100%;height:100%;object-fit:cover;border-radius:10px;position:absolute;inset:0;';
    preview.insertBefore(img, preview.querySelector('.icon-preview-overlay'));
    removeBtn.classList.add('visible');
  } else {
    fallback.style.display = '';
    const known = matchKnown(name);
    fallback.textContent =
      (known && known.emoji) || name.slice(0,2).toUpperCase() || '📦';
    removeBtn.classList.remove('visible');
  }
}

function getExpiringSoon() {
  return subs
    .filter(s => {
      if (!s.endDate) return false;
      const h = hoursLeft(s.endDate);
      return h !== null && h <= 72 && h >= -24;
    })
    .sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
}

function hoursLeft(dateStr) {
  if (!dateStr) return null;
  const end = new Date(dateStr); end.setHours(23,59,59,0);
  return (end - new Date()) / 3600000;
}

function getDaysLeft(s) {
  if (!s.endDate) return null;
  const h = hoursLeft(s.endDate);
  return h === null ? null : Math.ceil(h / 24);
}

function formatDaysLeft(days) {
  if (days === null) return null;
  if (days < 0) return 'Expired';
  if (days === 0) return 'Today';
  if (days === 1) return '1 day';
  if (days <= 7) return `${days} days`;
  const weeks = Math.floor(days / 7);
  if (weeks === 1) return '1 week';
  if (days <= 30) return `${weeks} weeks`;
  const months = Math.floor(days / 30);
  return months === 1 ? '1 month' : `${months} months`;
}

function updateNotifBell() {
  const expiring = getExpiringSoon();
  const btn = document.getElementById('notifBellBtn');
  const badge = document.getElementById('notifBadge');
  if (expiring.length > 0) {
    btn.classList.add('has-alerts');
    badge.style.display = 'flex';
    badge.textContent = expiring.length;
  } else {
    btn.classList.remove('has-alerts');
    badge.style.display = 'none';
  }
}

function openNotifPanel() {
  const expiring = getExpiringSoon();
  const list = document.getElementById('notifList');
  const countEl = document.getElementById('notifPanelCount');

  if (expiring.length === 0) {
    countEl.textContent = '';
    list.innerHTML =
      `<div class="notif-empty"><div class="big-emoji">✅</div><p>No subscriptions expiring<br>within the next 72 hours!</p></div>`;
  } else {
    countEl.textContent = `· ${expiring.length} alert${expiring.length !== 1 ? 's' : ''}`;
    list.innerHTML = expiring.map(s => {
      const known = matchKnown(s.name);
      const emoji = known ? known.emoji : '📦';
      const h = hoursLeft(s.endDate);
      let timeLabel, timeClass, itemClass;
      if (h < 0) { timeLabel = 'Expired'; timeClass = 'red'; itemClass = 'urgent'; }
      else if (h <= 1) { timeLabel = '< 1 hr left'; timeClass = 'red'; itemClass = 'urgent'; }
      else if (h <= 24) { timeLabel = `${Math.ceil(h)}h left`; timeClass = 'red'; itemClass = 'urgent'; }
      else {
        const hrs = Math.round(h);
        timeLabel = `~${Math.floor(hrs/24)}d ${hrs%24}h left`;
        timeClass = 'orange';
        itemClass = 'warning';
      }
      return `
        <div class="notif-item ${itemClass}">
          <div class="notif-emoji">${emoji}</div>
          <div class="notif-info">
            <div class="notif-name">${escHtml(s.name)}</div>
            <div class="notif-desc">${s.category} · ends ${fmtDate(s.endDate)}</div>
          </div>
          <div class="notif-time ${timeClass}">${timeLabel}</div>
        </div>`;
    }).join('');
  }

  document.getElementById('notifPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.addEventListener('keydown', handleNotifEscKey);
}

function closeNotifPanel() {
  document.getElementById('notifPanel').classList.remove('open');
  document.body.style.overflow = '';
  document.removeEventListener('keydown', handleNotifEscKey);
}

function handleNotifEscKey(e) { if (e.key === 'Escape') closeNotifPanel(); }
function handleNotifOverlayClick(e) {
  if (e.target === document.getElementById('notifPanel')) closeNotifPanel();
}

function toggleChart() {
  const chartModal = document.getElementById('chartModal');
  const isOpen = chartModal.classList.contains('open');
  if (isOpen) {
    chartModal.classList.remove('open');
    document.body.style.overflow = '';
    document.removeEventListener('keydown', handleChartEscKey);
  } else {
    chartModal.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.addEventListener('keydown', handleChartEscKey);
  }
}

function handleChartEscKey(e) { if (e.key === 'Escape') toggleChart(); }
function handleChartModalClick(e) {
  if (e.target === document.getElementById('chartModal')) toggleChart();
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function handleBillingChange(prefix) {
  const val = document.getElementById(prefix + 'Billing').value;
  document.getElementById(prefix + 'DaysWrapper')
          .classList.toggle('active', val === 'days');
  autoCalcEndDateByCycle(prefix);
}

function autoCalcEndDateByCycle(prefix, overrideBilling) {
  const startVal = document.getElementById(prefix + 'StartDate').value;
  if (!startVal) return;
  const billing = overrideBilling || document.getElementById(prefix + 'Billing').value;
  const d = new Date(startVal);
  if (billing === 'monthly') d.setDate(d.getDate() + 30);
  else if (billing === 'annual') { d.setFullYear(d.getFullYear() + 1); d.setDate(d.getDate() - 1); }
  else if (billing === 'weekly') d.setDate(d.getDate() + 7);
  else if (billing === 'days') {
    d.setDate(
      d.getDate() +
      (parseInt(document.getElementById(prefix + 'Days').value) || 30)
    );
  } else if (billing === 'one-time') return;
  else d.setDate(d.getDate() + 30);
  document.getElementById(prefix + 'EndDate').value =
    d.toISOString().split('T')[0];
}

function selectPaymentMode(prefix, mode) {
  document.getElementById(prefix + 'PaymentMode')
    .querySelectorAll('.payment-mode-btn')
    .forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
}

function getPaymentMode(prefix) {
  const active = document
    .getElementById(prefix + 'PaymentMode')
    .querySelector('.payment-mode-btn.active');
  return active ? active.dataset.mode : 'debit';
}

// ═══════════════════════════════════════════════════════════════════════════
// LOCK / AUTH SYSTEM (PIN + WEB AUTHN + RESET)
// ═══════════════════════════════════════════════════════════════════════════
const LOCK_DURATION = 30 * 24 * 60 * 60 * 1000;
const PIN_KEY = 'subsukesh_pin';
const UNLOCK_KEY = 'subsukesh_unlocked_until';
const SETTING_KEY = 'subsukesh_pin_set';
const WEBAUTHN_KEY = 'subsukesh_webauthn_id';

let pinBuffer = '';
let isSettingPin = false;
let pinConfirmBuffer = '';
let awaitingConfirm = false;
let failedPinAttempts = 0;

function initLock() {
  const pinSet = localStorage.getItem(SETTING_KEY);
  const unlockedUntil = parseInt(localStorage.getItem(UNLOCK_KEY) || '0');
  const now = Date.now();
  if (!pinSet) {
    showLockScreen(true);
  } else if (now < unlockedUntil) {
    hideLockScreen();
  } else {
    showLockScreen(false);
  }
}

function showLockScreen(setup) {
  isSettingPin = setup;
  awaitingConfirm = false;
  pinBuffer = '';
  pinConfirmBuffer = '';
  failedPinAttempts = 0;
  const forgotBtn = document.getElementById('forgotPinBtn');
  if (forgotBtn) forgotBtn.style.display = 'none';

  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('lockError').textContent = '';
  updateDots();

  if (setup) {
    document.getElementById('lockTitle').textContent = 'Set your PIN';
    document.getElementById('lockSubtitle').textContent =
      'Choose a 4-digit PIN to protect your app';
    document.getElementById('biometricBtn').style.display = 'none';
  } else {
    document.getElementById('lockTitle').textContent = 'Welcome back';
    document.getElementById('lockSubtitle').textContent =
      'Enter your PIN to continue';
    checkBiometricSupport().then(() => {
      triggerBiometric();
    });
  }
}

function hideLockScreen() {
  document.getElementById('lockScreen').classList.add('hidden');
}

function lockApp() {
  localStorage.removeItem(UNLOCK_KEY);
  pinBuffer = '';
  showLockScreen(false);
}

function pinKey(digit) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += digit;
  updateDots();
  document.getElementById('lockError').textContent = '';
  if (pinBuffer.length === 4) {
    setTimeout(() => handlePinComplete(), 150);
  }
}

function pinBackspace() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
}

function updateDots() {
  const len =
    isSettingPin && awaitingConfirm
      ? pinConfirmBuffer.length
      : pinBuffer.length;
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('filled', i < len);
    dot.classList.remove('error');
  }
}

function handlePinComplete() {
  const forgotBtn = document.getElementById('forgotPinBtn');

  if (isSettingPin) {
    // 2-step PIN setup: enter + confirm
    if (!awaitingConfirm) {
      pinConfirmBuffer = pinBuffer;
      awaitingConfirm = true;
      pinBuffer = '';
      updateDots();
      document.getElementById('lockSubtitle').textContent =
        'Re-enter your PIN to confirm';
    } else {
      if (pinBuffer === pinConfirmBuffer) {
        localStorage.setItem(PIN_KEY, hashPin(pinBuffer));
        localStorage.setItem(SETTING_KEY, '1');
        unlockSuccess();
      } else {
        showPinError('PINs do not match. Try again.');
        pinBuffer = '';
        pinConfirmBuffer = '';
        awaitingConfirm = false;
        document.getElementById('lockSubtitle').textContent =
          'Choose a 4-digit PIN to protect your app';
      }
    }
  } else {
    const stored = localStorage.getItem(PIN_KEY);
    if (hashPin(pinBuffer) === stored) {
      failedPinAttempts = 0;
      if (forgotBtn) forgotBtn.style.display = 'none';
      unlockSuccess();
    } else {
      failedPinAttempts++;
      showPinError('Incorrect PIN. Try again.');
      if (failedPinAttempts >= 3 && forgotBtn) {
        forgotBtn.style.display = 'block';
      }
      pinBuffer = '';
    }
  }
}

async function unlockSuccess() {
  localStorage.setItem(UNLOCK_KEY, Date.now() + LOCK_DURATION);
  hideLockScreen();

  const hasRegistered = localStorage.getItem(WEBAUTHN_KEY);
  if (!hasRegistered && localStorage.getItem(SETTING_KEY)) {
    const available = await isBiometricAvailable();
    if (available) {
      setTimeout(async () => {
        const registered = await registerBiometric();
        if (registered) {
          showToast('Face ID / Fingerprint enabled for next time! 🔐');
        }
      }, 800);
    }
  }
}

function showPinError(msg) {
  document.getElementById('lockError').textContent = msg;
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.add('error');
  }
  setTimeout(() => {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.remove('error', 'filled');
    }
  }, 600);
}

function hashPin(pin) {
  let hash = 0;
  const str = pin + 'subsukesh_salt_2024';
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return hash.toString(36);
}

// Forgot / reset PIN with Google-gated flow
function showForgotPin() {
  if (currentUser) {
    if (confirm(
      `Reset PIN? You'll be asked to set a new one.\nSigned in as: ${currentUser.email}`
    )) {
      resetPin();
    }
  } else {
    // If not signed in, require Google sign-in to verify
    const proceed = confirm(
      'To reset your PIN, please sign in with Google so we can verify it is you.'
    );
    if (!proceed) return;

    const provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(result => {
        if (confirm(
          `Reset PIN for ${result.user.email}?\nYour subscription data will NOT be deleted.`
        )) {
          resetPin();
        }
      })
      .catch(err => {
        showToast('Google sign-in failed: ' + err.message, true);
      });
  }
}

function resetPin() {
  localStorage.removeItem(PIN_KEY);
  localStorage.removeItem(SETTING_KEY);
  localStorage.removeItem(UNLOCK_KEY);
  localStorage.removeItem(WEBAUTHN_KEY);
  failedPinAttempts = 0;

  showLockScreen(true);
  showToast('PIN reset. Please set a new PIN.');
}

// Change PIN from inside the app (menu action)
function changePinFlow() {
  if (confirm('Change your PIN? You will be asked to set a new one now.')) {
    resetPin();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// WEBAUTHN — BIOMETRIC REGISTRATION & AUTHENTICATION
// ═══════════════════════════════════════════════════════════════════════════
function getRpId() {
  const host = window.location.hostname;
  return host === '' || host === 'localhost' ? 'localhost' : host;
}

async function isBiometricAvailable() {
  if (!window.PublicKeyCredential) return false;
  try {
    return await PublicKeyCredential
      .isUserVerifyingPlatformAuthenticatorAvailable();
  } catch(e) {
    return false;
  }
}

async function registerBiometric() {
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));

    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'SubSukesh', id: getRpId() },
        user: {
          id: userId,
          name: 'subsukesh_user',
          displayName: 'SubSukesh User'
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },
          { type: 'public-key', alg: -257 }
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
          requireResidentKey: false
        },
        timeout: 60000,
        attestation: 'none'
      }
    });

    if (credential) {
      const credId = btoa(
        String.fromCharCode(...new Uint8Array(credential.rawId))
      );
      localStorage.setItem(WEBAUTHN_KEY, credId);
      console.log('✅ Biometric registered!');
      return true;
    }
  } catch(e) {
    console.log('Biometric registration skipped:', e.message);
  }
  return false;
}

async function authenticateBiometric() {
  const storedCredId = localStorage.getItem(WEBAUTHN_KEY);
  if (!storedCredId) return false;

  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const credIdBytes = Uint8Array.from(
      atob(storedCredId),
      c => c.charCodeAt(0)
    );

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        rpId: getRpId(),
        allowCredentials: [{
          type: 'public-key',
          id: credIdBytes,
          transports: ['internal']
        }],
        userVerification: 'required',
        timeout: 60000
      }
    });

    return !!assertion;
  } catch(e) {
    console.log('Biometric auth failed:', e.message);
    return false;
  }
}

async function checkBiometricSupport() {
  const btn = document.getElementById('biometricBtn');
  const available = await isBiometricAvailable();
  if (available) {
    btn.style.display = 'flex';
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    document.getElementById('biometricIcon').textContent = isIOS ? '🔐' : '👆';
    document.getElementById('biometricLabel').textContent =
      isIOS ? 'Use Face ID' : 'Use Fingerprint';
  }
  return available;
}

async function triggerBiometric() {
  if (!localStorage.getItem(SETTING_KEY)) return;
  const available = await isBiometricAvailable();
  if (!available) return;

  const hasRegistered = localStorage.getItem(WEBAUTHN_KEY);
  if (!hasRegistered) {
    document.getElementById('lockSubtitle').textContent =
      'Setting up biometric for this device...';
    const registered = await registerBiometric();
    if (registered) {
      unlockSuccess();
      showToast('Face ID / Fingerprint set up! 🎉');
    }
  } else {
    const success = await authenticateBiometric();
    if (success) unlockSuccess();
  }
}
