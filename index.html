<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>SubSukesh – Subscription Tracker</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0b0b12;
    --card: #13131f;
    --card2: #1a1a2a;
    --border: rgba(255,255,255,0.07);
    --gold: #f5c542;
    --gold2: #e6a817;
    --purple: #9b7fe8;
    --purple2: #7c5cbf;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --danger: #ff5e72;
    --success: #4cd9a0;
    --font-head: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }

  /* Light mode - Professional palette */
  body.light-mode {
    --bg: #d9934a;
    --card: #4a5f7a;
    --card2: #3d5066;
    --border: rgba(255,255,255,0.2);
    --text: #ffffff;
    --muted: #f5f0e8;
  }

  body.light-mode::before {
    background: radial-gradient(circle, rgba(74,95,122,0.15) 0%, transparent 70%);
  }
  body.light-mode::after {
    background: radial-gradient(circle, rgba(217,147,74,0.2) 0%, transparent 70%);
  }
  
  body.light-mode .summary-card .label,
  body.light-mode .sub-cycle,
  body.light-mode .sub-row-enddate,
  body.light-mode .detail-label,
  body.light-mode .form-label,
  body.light-mode .notif-desc,
  body.light-mode .cat-label {
    color: #f5f0e8;
  }
  
  body.light-mode .summary-card .amount,
  body.light-mode .sub-name,
  body.light-mode .detail-value,
  body.light-mode .section-title,
  body.light-mode .modal-title,
  body.light-mode .notif-name,
  body.light-mode header h1 {
    color: #ffffff;
  }
  
  body.light-mode header p {
    color: #f5f0e8;
  }
  
  body.light-mode .form-input,
  body.light-mode .form-select {
    color: #ffffff;
    background: rgba(0,0,0,0.1);
    border-color: rgba(255,255,255,0.2);
  }
  
  body.light-mode .form-input::placeholder {
    color: #d0c8bc;
  }
  
  body.light-mode .pay-badge {
    color: #f5f0e8;
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(155,127,232,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(245,197,66,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app-wrapper {
    max-width: 1680px;
    margin: 0 auto;
    padding: 20px 24px 40px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 16px 0 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    position: relative;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--gold), var(--purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: #0b0b12;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 2px;
  }
  
  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    position: absolute;
    right: 0;
  }

  .theme-toggle {
    position: relative;
    width: 56px;
    height: 28px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .theme-toggle:hover {
    background: var(--card);
  }
  .theme-toggle-slider {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: var(--gold);
    border-radius: 50%;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  body.light-mode .theme-toggle-slider {
    left: 31px;
    background: var(--purple);
  }

  .main-grid {
    display: grid;
    grid-template-columns: 320px 1fr 1fr;
    gap: 20px;
    align-items: start;
  }

  .left-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: sticky;
    top: 20px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    min-height: 88px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .summary-card:hover {
    background: var(--card2);
    border-color: rgba(255,255,255,0.12);
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--purple));
  }
  .summary-card.full {
    grid-column: 1 / -1;
    min-height: 88px;
  }
  .summary-card .label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .summary-card .amount {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .summary-card .amount span {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 2px;
  }
  .summary-card .sub-note {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
  }
  .summary-card .sub-note b { color: var(--gold); font-weight: 600; }
  .summary-card .count-badge {
    position: absolute;
    top: 16px; right: 14px;
    background: rgba(245,197,66,0.1);
    color: var(--gold);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 20px;
    border: 1px solid rgba(245,197,66,0.2);
  }

  .chart-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .chart-modal.open {
    opacity: 1;
    pointer-events: all;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 500px;
    width: 90%;
    transform: scale(0.9);
    transition: transform 0.3s;
  }
  .chart-modal.open .chart-card {
    transform: scale(1);
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
  }
  .chart-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .chart-canvas-wrap {
    width: 180px; height: 180px;
    position: relative;
  }
  #pieChart { width: 180px !important; height: 180px !important; }
  .chart-legend {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
  }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .legend-name {
    color: var(--text);
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .legend-pct {
    color: var(--muted);
    font-size: 10px;
  }
  .no-data-msg {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
  }

  .center-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 600px;
  }

  .right-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 600px;
    position: sticky;
    top: 20px;
    align-self: start;
  }

  .view-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 4px;
  }
  .toggle-btn {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.active {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0b0b12;
    font-weight: 600;
  }

  .subs-scroll {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
  }
  .subs-scroll::-webkit-scrollbar { width: 6px; }
  .subs-scroll::-webkit-scrollbar-track { background: transparent; }
  .subs-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .subs-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

  .category-block { margin-bottom:18px; }
  .cat-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .cat-label  { display:flex; align-items:center; gap:7px; font-size:11px; font-weight:600; color:var(--muted); }
  .cat-icon   { font-size:13px; }
  .cat-total  { font-size:11px; color:var(--gold); font-weight:600; }

  .sub-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sub-card:hover { background: var(--card2); border-color: rgba(255,255,255,0.12); }
  .sub-card.just-renewed { 
    background: rgba(76,217,160,0.1) !important; 
    border-color: var(--success) !important; 
  }

  .sub-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sub-logo {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--card2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .sub-logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }
  .sub-info {
    flex: 1;
    min-width: 0;
  }
  .sub-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sub-cycle {
    font-size: 11px;
    color: var(--muted);
  }
  .sub-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .sub-row-price {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
    min-width: 50px;
    text-align: right;
  }
  .sub-row-enddate {
    font-size: 12px;
    color: #ffffff;
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  
  body.light-mode .sub-row-enddate {
    color: #f5f0e8;
  }
  .pay-badge {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    padding: 3px 7px;
    border-radius: 6px;
    border: 1px solid var(--border);
    white-space: nowrap;
    min-width: 45px;
    text-align: center;
  }

  .days-left-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 6px;
    border: 1px solid var(--border);
    white-space: nowrap;
    min-width: 60px;
    text-align: center;
  }
  .days-left-badge.yellow {
    color: var(--gold);
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.3);
  }
  .days-left-badge.green {
    color: var(--success);
    background: rgba(76,217,160,0.1);
    border-color: rgba(76,217,160,0.3);
  }
  .days-left-badge.red {
    color: var(--danger);
    background: rgba(255,94,114,0.1);
    border-color: rgba(255,94,114,0.3);
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-dot.green {
    background: var(--success);
    box-shadow: 0 0 8px rgba(76,217,160,0.5);
  }
  .status-dot.yellow {
    background: var(--gold);
    box-shadow: 0 0 8px rgba(245,197,66,0.5);
  }
  .status-dot.red {
    background: var(--danger);
    box-shadow: 0 0 8px rgba(255,94,114,0.5);
  }

  .sub-card.expanded .sub-meta { display: none; }

  .sub-details {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    gap: 10px;
  }
  .sub-card.expanded .sub-details { display: flex; }

  .detail-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .detail-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }
  .detail-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
  }

  .sub-actions {
    display: none;
    margin-top: 10px;
    gap: 8px;
  }
  .sub-card.expanded .sub-actions { display: flex; }

  .sub-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sub-btn.edit { background: rgba(155,127,232,0.12); color: var(--purple); border: 1px solid rgba(155,127,232,0.2); }
  .sub-btn.renew { background: rgba(76,217,160,0.12); color: var(--success); border: 1px solid rgba(76,217,160,0.2); }
  .sub-btn.end { background: rgba(255,94,114,0.12); color: var(--danger); border: 1px solid rgba(255,94,114,0.2); }
  .sub-btn:hover { opacity: 0.8; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-emoji {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .right-col {
    position: sticky;
    top: 20px;
  }

  .add-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  
  .add-card .section-title {
    margin-bottom: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    transition: all 0.2s;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--card);
  }
  .form-input::placeholder { color: var(--muted); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .days-input-wrapper {
    display: none;
  }
  .days-input-wrapper.active {
    display: block;
  }

  .payment-mode-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 6px;
  }
  .payment-mode-btn {
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--card2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .payment-mode-btn.active {
    background: rgba(245,197,66,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  .add-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0b0b12;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,197,66,0.3); }

  .notif-bell-btn {
    position: relative;
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .notif-bell-btn:hover { background: var(--card2); border-color: rgba(255,255,255,0.12); }
  .notif-bell-btn.has-alerts { color: var(--gold); border-color: var(--gold); }
  .notif-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: var(--danger);
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 10px;
    display: none;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 480px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    transform: scale(0.9);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal-content { transform: scale(1); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--bg); }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn.primary {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #0b0b12;
  }
  .modal-btn.secondary {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .modal-btn:hover { opacity: 0.9; }

  .icon-upload-area {
    display: flex;
    align-items: center;
    gap: 14px;
